<!DOCTYPE html>
<html>
<head>
    <title>Paxlist - Passenger Information</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
        
        /* Token Section */
        .token-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .token-section textarea { width: 100%; font-family: monospace; font-size: 11px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; margin: 10px 0; }
        .token-status { padding: 8px 12px; border-radius: 5px; margin-bottom: 10px; font-size: 13px; }
        .status-ok { background: #d4edda; color: #155724; }
        .status-expired { background: #f8d7da; color: #721c24; }
        
        /* Search Section */
        .search-section { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .search-field { flex: 1; min-width: 120px; }
        .search-field label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #555; }
        .search-field input, .search-field select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0056b3; }
        
        /* Stats Section */
        .stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card.c { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card.y { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        
        /* Passenger Dropdown */
        .passenger-section { margin-bottom: 20px; }
        .passenger-section select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        
        /* Passenger Details */
        .passenger-details { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #eee; }
        .detail-label { font-weight: bold; width: 120px; color: #555; }
        .detail-value { flex: 1; }
        
        .loading { text-align: center; padding: 20px; color: #666; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .flight-info { background: #d1ecf1; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; }
        
        button.small { background: #6c757d; padding: 5px 10px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛫 Paxlist</h1>
        <div class="subtitle">Passenger Information System</div>
        
        <!-- Token Section -->
        <div class="token-section">
            <div id="tokenStatus" class="token-status status-expired">❌ No tokens configured</div>
            <textarea id="tokenJson" rows="2" placeholder='{"access_token":"eyJ0eXAi...","refresh_token":"1.ASUAPt..."}'></textarea>
            <button onclick="setTokens()">💾 Save Tokens</button>
            <button onclick="checkTokenStatus()" class="small">Check Status</button>
        </div>
        
        <!-- Search Section -->
        <div class="search-section">
            <div class="search-row">
                <div class="search-field">
                    <label>Flight #</label>
                    <input type="text" id="flightNumber" value="120" placeholder="e.g., 120">
                </div>
                <div class="search-field">
                    <label>From</label>
                    <input type="text" id="departure" value="BOG" placeholder="e.g., BOG">
                </div>
                <div class="search-field">
                    <label>Date</label>
                    <input type="date" id="flightDate">
                </div>
                <div>
                    <label>&nbsp;</label><br>
                    <button onclick="searchPassengers()">🔍 Search</button>
                </div>
            </div>
        </div>
        
        <!-- Results Area -->
        <div id="results"></div>
    </div>
    
    <script>
        // Set default date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('flightDate').value = tomorrow.toISOString().split('T')[0];
        
        async function setTokens() {
            const jsonInput = document.getElementById('tokenJson').value.trim();
            if (!jsonInput) { alert('Please paste JSON tokens'); return; }
            
            try {
                let tokens = JSON.parse(jsonInput);
                if (typeof tokens === 'string') tokens = JSON.parse(tokens);
                
                let access_token = tokens.access_token;
                let refresh_token = tokens.refresh_token;
                if (Array.isArray(access_token)) access_token = access_token[0];
                if (Array.isArray(refresh_token)) refresh_token = refresh_token[0];
                
                const response = await fetch('/api/paxlist/set_initial_tokens', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({access_token, refresh_token})
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ Tokens saved!');
                    location.reload();
                } else {
                    alert('❌ ' + result.message);
                }
            } catch(e) {
                alert('Invalid JSON: ' + e.message);
            }
        }
        
        async function checkTokenStatus() {
            try {
                const response = await fetch('/api/paxlist/token_status');
                const data = await response.json();
                const statusDiv = document.getElementById('tokenStatus');
                
                if (data.status.access_token_valid) {
                    statusDiv.className = 'token-status status-ok';
                    statusDiv.innerHTML = `✅ Token valid for ${data.status.access_expires_in_minutes} min | Refresh: ${data.status.refresh_expires_in_hours}h`;
                } else if (data.status.refresh_token_valid) {
                    statusDiv.className = 'token-status status-expired';
                    statusDiv.innerHTML = `⚠️ Access expired. <button onclick="refreshToken()" class="small">Refresh</button>`;
                } else {
                    statusDiv.className = 'token-status status-expired';
                    statusDiv.innerHTML = '❌ No valid tokens. Paste JSON above.';
                }
            } catch(e) { console.error(e); }
        }
        
        async function refreshToken() {
            const response = await fetch('/api/paxlist/refresh_token', {method: 'POST'});
            const data = await response.json();
            if (data.success) location.reload();
            else alert('Refresh failed');
        }
        
        async function searchPassengers() {
            const flightNumber = document.getElementById('flightNumber').value;
            const departure = document.getElementById('departure').value.toUpperCase();
            const flightDate = document.getElementById('flightDate').value;
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Loading passengers...</div>';
            
            try {
                const response = await fetch('/api/paxlist/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        flight_carrier: 'AV',
                        flight_number: flightNumber,
                        flight_departure_station: departure,
                        flight_date: flightDate
                    })
                });
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    displayResults(result.data, flightNumber, departure, flightDate);
                } else if (result.needs_new_tokens) {
                    resultsDiv.innerHTML = '<div class="error">❌ Token expired. Please paste new tokens above.</div>';
                } else {
                    resultsDiv.innerHTML = `<div class="error">❌ ${result.message || 'Search failed'}</div>`;
                }
            } catch(e) {
                resultsDiv.innerHTML = `<div class="error">❌ Error: ${e.message}</div>`;
            }
        }
        
        function displayResults(data, flightNumber, departure, flightDate) {
            const passengers = data.passengers || [];
            
            // Count passengers by cabin
            let cClass = 0, yClass = 0;
            for (const p of passengers) {
                if (p.cabin === 'C') cClass++;
                else yClass++;
            }
            
            // Build dropdown options
            let dropdownOptions = '<option value="">-- Select passenger --</option>';
            for (let i = 0; i < passengers.length; i++) {
                const p = passengers[i];
                const name = `${p.lastname || ''}, ${p.firstname || ''}`.trim() || 'Unknown';
                dropdownOptions += `<option value="${i}">${p.seat || '???'} - ${name} (${p.cabin || 'Y'})</option>`;
            }
            
            let html = `
                <div class="flight-info">
                    ✈️ AV${flightNumber} | ${departure} → ${passengers[0]?.arrival_station || '???'} | 📅 ${flightDate}
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number">${passengers.length}</div>
                        <div class="stat-label">Total Passengers</div>
                    </div>
                    <div class="stat-card c">
                        <div class="stat-number">${cClass}</div>
                        <div class="stat-label">Business (C)</div>
                    </div>
                    <div class="stat-card y">
                        <div class="stat-number">${yClass}</div>
                        <div class="stat-label">Economy (Y)</div>
                    </div>
                </div>
                
                <div class="passenger-section">
                    <select id="passengerSelect" onchange="showPassengerDetails(${JSON.stringify(passengers).replace(/"/g, '&quot;')})">
                        ${dropdownOptions}
                    </select>
                </div>
                
                <div id="passengerDetails" class="passenger-details" style="display:none;"></div>
            `;
            
            document.getElementById('results').innerHTML = html;
            
            // Update token status in background
            checkTokenStatus();
        }
        
        function showPassengerDetails(passengers) {
            const select = document.getElementById('passengerSelect');
            const index = select.value;
            const detailsDiv = document.getElementById('passengerDetails');
            
            if (!index || index === '') {
                detailsDiv.style.display = 'none';
                return;
            }
            
            const p = passengers[parseInt(index)];
            
            // Get frequent flyer info
            let lfmInfo = '-';
            if (p.lfm && p.lfm.length > 0) {
                const lfm = p.lfm[0];
                lfmInfo = `${lfm.carrier || ''} ${lfm.number || ''} (${lfm.tierDescription || 'LifeMiles'})`;
            }
            
            // Get special services
            let specialServices = [];
            if (p.meal_code) specialServices.push(`🍽️ Meal: ${p.meal_code}`);
            if (p.value_chd === 'CHD') specialServices.push('👶 Child');
            if (p.value_inf === 'INF') specialServices.push('🍼 Infant');
            if (p.value_staff) specialServices.push('👔 Staff');
            
            const specialHtml = specialServices.length > 0 ? specialServices.join(' | ') : 'None';
            
            detailsDiv.style.display = 'block';
            detailsDiv.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">Passenger:</div>
                    <div class="detail-value"><strong>${p.lastname || ''}, ${p.firstname || ''}</strong></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Seat:</div>
                    <div class="detail-value"><strong>${p.seat || 'N/A'}</strong> (${p.cabin || 'Y'} Class)</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Frequent Flyer:</div>
                    <div class="detail-value">${lfmInfo}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Special Services:</div>
                    <div class="detail-value">${specialHtml}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Destination:</div>
                    <div class="detail-value">${p.arrival_station || 'N/A'}</div>
                </div>
            `;
        }
        
        // Initial check
        checkTokenStatus();
    </script>
</body>
</html>
