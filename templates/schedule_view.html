<!DOCTYPE html>
<html>
<head>
    <title>Paxlist API Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px; }
        textarea { width: 100%; height: 100px; padding: 10px; margin: 5px; font-family: monospace; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .flight-info { background: #e8f4fc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .passenger { border-bottom: 1px solid #eee; padding: 5px; margin: 5px 0; }
        .stats { display: inline-block; margin: 10px; padding: 10px; background: #f0f0f0; border-radius: 5px; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛫 Paxlist API Test</h2>
        
        <div class="flight-info">
            <strong>Current Token Status:</strong> 
            <span id="tokenStatus">Not set</span>
            <button onclick="checkTokenExpiry()">Check Token</button>
        </div>
        
        <div>
            <textarea id="newToken" placeholder="Paste new access_token here..."></textarea>
            <button onclick="updateToken()">Update Token</button>
        </div>
        
        <hr>
        
        <div>
            <h3>Flight Search</h3>
            <input type="text" id="flight_number" placeholder="Flight Number" value="120">
            <input type="text" id="departure" placeholder="Departure Station" value="BOG">
            <input type="date" id="date">
            <button onclick="test()">Search Passengers</button>
        </div>
        
        <div id="result"></div>
    </div>
    
    <script>
        let token = "";
        
        // Set default date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = today;
        
        function updateToken() {
            const newToken = document.getElementById('newToken').value.trim();
            if (newToken) {
                token = newToken;
                localStorage.setItem('paxlist_token', token);
                document.getElementById('tokenStatus').innerHTML = 'Token updated!';
                document.getElementById('tokenStatus').style.color = 'green';
                console.log('Token saved');
            }
        }
        
        function checkTokenExpiry() {
            if (!token) {
                const saved = localStorage.getItem('paxlist_token');
                if (saved) {
                    token = saved;
                    document.getElementById('tokenStatus').innerHTML = 'Token loaded from storage';
                } else {
                    document.getElementById('tokenStatus').innerHTML = 'No token set';
                    return;
                }
            }
            
            try {
                // Decode JWT to check expiry
                const parts = token.split('.');
                if (parts.length === 3) {
                    const payload = JSON.parse(atob(parts[1]));
                    const expiry = new Date(payload.exp * 1000);
                    const now = new Date();
                    const minutesLeft = Math.floor((expiry - now) / 60000);
                    
                    if (minutesLeft > 0) {
                        document.getElementById('tokenStatus').innerHTML = `Valid for ${minutesLeft} minutes (expires ${expiry.toLocaleTimeString()})`;
                        document.getElementById('tokenStatus').style.color = 'green';
                    } else {
                        document.getElementById('tokenStatus').innerHTML = `EXPIRED (expired ${expiry.toLocaleString()})`;
                        document.getElementById('tokenStatus').style.color = 'red';
                    }
                }
            } catch(e) {
                document.getElementById('tokenStatus').innerHTML = 'Invalid token format';
                document.getElementById('tokenStatus').style.color = 'red';
            }
        }
        
        async function test() {
            if (!token) {
                const saved = localStorage.getItem('paxlist_token');
                if (saved) {
                    token = saved;
                } else {
                    alert('Please paste a token first!');
                    return;
                }
            }
            
            const flight = document.getElementById('flight_number').value;
            const departure = document.getElementById('departure').value.toUpperCase();
            const date = document.getElementById('date').value;
            
            const payload = {
                flight_carrier: "AV",
                flight_number: flight,
                flight_departure_station: departure,
                flight_date: date
            };
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="result">Searching...</div>';
            
            try {
                const response = await fetch('https://paxlist.avianca.com/crew_devices/consulta_pasajeros', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json, text/plain, */*',
                        'Origin': 'https://paxlist.avianca.com',
                        'Referer': 'https://paxlist.avianca.com/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok && data.codigo === "200") {
                    displayResults(data);
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>❌ Error ${response.status}</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            ${response.status === 401 ? '<p>💡 Token expired! Please get a new token and update it.</p>' : ''}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Network Error</h3>
                        <p>${error.message}</p>
                        <p>Check if you have internet connection and CORS is not blocked.</p>
                    </div>
                `;
            }
        }
        
        function displayResults(data) {
            const resultDiv = document.getElementById('result');
            const passengers = data.passengers || [];
            
            let html = `
                <div class="result success">
                    <h3>✅ Flight AV${data.flight_carrier_number || 'N/A'}</h3>
                    <div class="flight-info">
                        <div class="stats">✈️ Aircraft: ${data.aircraft_type || 'N/A'} (${data.aircraft_registration || 'N/A'})</div>
                        <div class="stats">🚪 Gate: ${data.gate || 'N/A'}</div>
                        <div class="stats">🕐 Departure: ${data.departure_date_schedule || 'N/A'}</div>
                        <div class="stats">📊 Status: ${data.flight_acceptance_status || 'N/A'}</div>
                    </div>
                    
                    <div class="flight-info">
                        <h4>Passenger Statistics</h4>
                        <div class="stats">👥 Total: ${data.total_passenger_accepted || 0}</div>
                        <div class="stats">👨 Male: ${data.total_passenger_male || 0}</div>
                        <div class="stats">👩 Female: ${data.total_passenger_female || 0}</div>
                        <div class="stats">👶 Children: ${data.total_passenger_child || 0}</div>
                        <div class="stats">💺 Business: ${data.total_passenger_cabin_c || 0}</div>
                        <div class="stats">💺 Economy: ${data.total_passenger_cabin_y || 0}</div>
                        <div class="stats">♿ Special Needs: ${data.total_wchr || 0}</div>
                        <div class="stats">🍽️ Special Meals: ${data.total_chml || 0}</div>
                    </div>
                    
                    <h4>Passenger List (${passengers.length} shown)</h4>
                    <div style="max-height: 400px; overflow-y: auto;">
            `;
            
            passengers.forEach((p, i) => {
                const lfmStatus = p.lfm && p.lfm.length > 0 ? p.lfm[0].tierDescription || 'LifeMiles' : '';
                const specialMeal = p.meal_code ? `🍽️ ${p.meal_code}` : '';
                
                html += `
                    <div class="passenger">
                        <strong>${p.seat || '???'}</strong> - 
                        ${p.lastname || ''}, ${p.firstname || ''}
                        ${lfmStatus ? `⭐ ${lfmStatus}` : ''}
                        ${specialMeal ? ` ${specialMeal}` : ''}
                        ${p.value_chd === 'CHD' ? ' 👶 Child' : ''}
                    </div>
                `;
            });
            
            html += `
                    </div>
                    <details>
                        <summary>Raw JSON Response</summary>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </details>
                </div>
            `;
            
            resultDiv.innerHTML = html;
        }
        
        // Load saved token on page load
        const savedToken = localStorage.getItem('paxlist_token');
        if (savedToken) {
            token = savedToken;
            document.getElementById('tokenStatus').innerHTML = 'Token loaded from storage';
            checkTokenExpiry();
        }
    </script>
</body>
</html>
