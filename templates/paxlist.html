<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { font-family: monospace; margin: 0; padding: 10px; background: #fff; }
        textarea { width: 100%; font-family: monospace; font-size: 11px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; resize: vertical; }
        .status { padding: 6px 10px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; display: none; }
        .status.show { display: block; }
        .ok { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .stats { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat { flex: 1; text-align: center; padding: 12px 8px; background: #f5f5f5; border-radius: 4px; cursor: pointer; transition: all 0.2s; min-width: 80px; }
        .stat:hover { background: #e0e0e0; transform: scale(1.02); }
        .stat span { font-size: 24px; font-weight: bold; display: block; }
        .stat.active { background: #007bff; color: white; }
        .passenger-list { margin-top: 15px; max-height: 400px; overflow-y: auto; }
        .passenger-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 11px; cursor: pointer; }
        .passenger-item:hover { background: #f0f0f0; }
        .passenger-item.selected { background: #007bff; color: white; }
        .details { background: #f5f5f5; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 15px; }
        .row { display: flex; margin-bottom: 6px; }
        .label { font-weight: bold; width: 100px; }
        .flight-info { background: #e8f4f8; padding: 8px; border-radius: 4px; margin-bottom: 10px; font-size: 11px; }
        input, select { font-family: monospace; font-size: 12px; }
        .search-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-row input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 6px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; }
        button:hover { background: #0056b3; }
        .loading { text-align: center; padding: 20px; font-size: 12px; color: #666; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; margin-left: 8px; }
        .badge-c { background: #f093fb; color: #fff; }
        .badge-y { background: #4facfe; color: #fff; }
        .badge-staff { background: #ff9800; color: #fff; }
        .lfm { font-size: 10px; color: #666; }
    </style>
</head>
<body>
<textarea id="tokenInput" rows="2" placeholder=''></textarea>
<div id="status" class="status"></div>

<div class="search-row">
    <input type="text" id="flightNum" placeholder="Flight" value="124" size="8">
    <input type="text" id="dep" placeholder="From" value="UIO" size="5">
    <input type="date" id="date">
    <button onclick="search()">Search</button>
</div>

<div id="results"></div>

<script>
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
document.getElementById('date').value = tomorrow.toISOString().split('T')[0];

let currentPassengers = [];
let currentFilter = null;

function isStaff(passenger) {
    // Staff if value_staff is not empty
    return passenger.value_staff && passenger.value_staff.trim() !== '';
}

function getStaffValue(passenger) {
    return passenger.value_staff || '';
}

function getLfm(passenger) {
    if (passenger.lfm && passenger.lfm.length > 0) {
        const lfmData = passenger.lfm[0];
        return lfmData.tierDescription || lfmData.tierLevel || 'LifeMiles';
    }
    return '';
}

// Auto-detect paste and save tokens
document.getElementById('tokenInput').addEventListener('paste', function(e) {
    setTimeout(async () => {
        const jsonInput = document.getElementById('tokenInput').value.trim();
        if (!jsonInput) return;
        
        const statusDiv = document.getElementById('status');
        statusDiv.className = 'status show';
        statusDiv.innerHTML = '🔄 Saving tokens...';
        statusDiv.style.background = '#fff3cd';
        statusDiv.style.color = '#856404';
        
        try {
            let tokens = JSON.parse(jsonInput);
            if (typeof tokens === 'string') tokens = JSON.parse(tokens);
            
            let access_token = tokens.access_token;
            let refresh_token = tokens.refresh_token;
            if (Array.isArray(access_token)) access_token = access_token[0];
            if (Array.isArray(refresh_token)) refresh_token = refresh_token[0];
            
            const response = await fetch('/api/paxlist/set_initial_tokens', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({access_token, refresh_token})
            });
            const result = await response.json();
            
            if (result.success) {
                statusDiv.className = 'status show ok';
                statusDiv.innerHTML = '✅ Tokens saved';
                setTimeout(() => { statusDiv.classList.remove('show'); }, 2000);
                checkTokenStatus();
            } else {
                throw new Error(result.message);
            }
        } catch(e) {
            statusDiv.className = 'status show error';
            statusDiv.innerHTML = '❌ Invalid token format';
            setTimeout(() => { statusDiv.classList.remove('show'); }, 2000);
        }
    }, 50);
});

async function checkTokenStatus() {
    try {
        const response = await fetch('/api/paxlist/token_status');
        const data = await response.json();
        const statusDiv = document.getElementById('status');
        
        if (data.status.access_token_valid) {
            statusDiv.className = 'status show ok';
            statusDiv.innerHTML = `✅ Token: ${data.status.access_expires_in_minutes} min left`;
            setTimeout(() => { statusDiv.classList.remove('show'); }, 1500);
        }
    } catch(e) {}
}

async function search() {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<div class="loading">Loading...</div>';
    currentFilter = null;
    
    try {
        const response = await fetch('/api/paxlist/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                flight_carrier: 'AV',
                flight_number: document.getElementById('flightNum').value,
                flight_departure_station: document.getElementById('dep').value.toUpperCase(),
                flight_date: document.getElementById('date').value
            })
        });
        
        const result = await response.json();
        
        if (result.success && result.data) {
            currentPassengers = result.data.passengers || [];
            displayStats();
        } else if (result.needs_new_tokens) {
            resultsDiv.innerHTML = '<div class="loading" style="color:#721c24;">❌ Token expired. Paste new token above.</div>';
        } else {
            resultsDiv.innerHTML = `<div class="loading" style="color:#721c24;">❌ ${result.message || 'Search failed'}</div>`;
        }
    } catch(e) {
        resultsDiv.innerHTML = `<div class="loading" style="color:#721c24;">❌ ${e.message}</div>`;
    }
}

function displayStats() {
    let total = currentPassengers.length;
    let cClass = 0, yClass = 0, staff = 0;
    
    for (const p of currentPassengers) {
        if (p.cabin === 'C') cClass++;
        else yClass++;
        if (isStaff(p)) staff++;
    }
    
    let html = `
        <div class="flight-info">
            ✈️ AV${document.getElementById('flightNum').value} | 
            ${document.getElementById('dep').value.toUpperCase()} → ${currentPassengers[0]?.arrival_station || '???'} | 
            📅 ${document.getElementById('date').value}
        </div>
        <div class="stats">
            <div class="stat" onclick="showByType('all')" id="statAll">
                <span>${total}</span>Total
            </div>
            <div class="stat" onclick="showByType('c')" id="statC">
                <span>${cClass}</span>Business (C)
            </div>
            <div class="stat" onclick="showByType('y')" id="statY">
                <span>${yClass}</span>Economy (Y)
            </div>
            <div class="stat" onclick="showByType('staff')" id="statStaff">
                <span>${staff}</span>Staff
            </div>
        </div>
        <div id="passengerList" class="passenger-list"></div>
        <div id="details" class="details" style="display:none;"></div>
    `;
    
    document.getElementById('results').innerHTML = html;
    showByType('all');
    checkTokenStatus();
}

function showByType(type) {
    currentFilter = type;
    
    document.querySelectorAll('.stat').forEach(stat => stat.classList.remove('active'));
    if (type === 'all') document.getElementById('statAll')?.classList.add('active');
    else if (type === 'c') document.getElementById('statC')?.classList.add('active');
    else if (type === 'y') document.getElementById('statY')?.classList.add('active');
    else if (type === 'staff') document.getElementById('statStaff')?.classList.add('active');
    
    let filtered = [];
    
    if (type === 'all') {
        filtered = currentPassengers;
    } else if (type === 'c') {
        filtered = currentPassengers.filter(p => p.cabin === 'C');
    } else if (type === 'y') {
        filtered = currentPassengers.filter(p => p.cabin !== 'C');
    } else if (type === 'staff') {
        filtered = currentPassengers.filter(p => isStaff(p));
    }
    
    filtered.sort((a, b) => {
        const seatA = a.seat || 'ZZZ';
        const seatB = b.seat || 'ZZZ';
        return seatA.localeCompare(seatB);
    });
    
    const listDiv = document.getElementById('passengerList');
    const detailsDiv = document.getElementById('details');
    detailsDiv.style.display = 'none';
    
    if (filtered.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">No passengers</div>';
        return;
    }
    
    let html = '';
    for (let i = 0; i < filtered.length; i++) {
        const p = filtered[i];
        const name = `${p.lastname || ''}, ${p.firstname || ''}`.trim() || 'Unknown';
        const seat = p.seat || '???';
        const cabin = p.cabin || 'Y';
        const lfm = getLfm(p);
        const staffValue = getStaffValue(p);
        
        const cabinBadge = cabin === 'C' ? '<span class="badge badge-c">C</span>' : '<span class="badge badge-y">Y</span>';
        const staffBadge = staffValue ? `<span class="badge badge-staff">${staffValue}</span>` : '';
        const lfmText = lfm ? `<span class="lfm">⭐${lfm}</span>` : '';
        
        html += `
            <div class="passenger-item" onclick="showPassengerDetails(${currentPassengers.indexOf(p)})">
                <strong>${seat}</strong> - ${name} ${cabinBadge} ${staffBadge} ${lfmText}
            </div>
        `;
    }
    
    listDiv.innerHTML = html;
}

function showPassengerDetails(index) {
    const p = currentPassengers[index];
    const detailsDiv = document.getElementById('details');
    
    document.querySelectorAll('.passenger-item').forEach((item, i) => {
        item.classList.remove('selected');
        if (i === index) item.classList.add('selected');
    });
    
    let lfm = '-';
    if (p.lfm && p.lfm.length > 0) {
        const lfmData = p.lfm[0];
        lfm = `${lfmData.carrier || ''} ${lfmData.number || ''} (${lfmData.tierDescription || lfmData.tierLevel || 'LifeMiles'})`;
    }
    
    let special = [];
    if (p.meal_code) special.push(`🍽️ Meal: ${p.meal_code}`);
    if (p.value_chd === 'CHD') special.push('👶 Child');
    if (p.value_inf === 'INF') special.push('🍼 Infant');
    if (p.ssr_code) special.push(`♿ ${p.ssr_code}`);
    const specialStr = special.length ? special.join(' | ') : '-';
    
    const staffValue = getStaffValue(p);
    const staffDisplay = staffValue ? `<div class="row"><div class="label">Staff:</div><div>✅ ${staffValue}</div></div>` : '';
    
    detailsDiv.style.display = 'block';
    detailsDiv.innerHTML = `
        <div class="row"><div class="label">Name:</div><div><strong>${p.lastname || ''}, ${p.firstname || ''}</strong></div></div>
        <div class="row"><div class="label">Seat:</div><div>${p.seat || 'N/A'} (${p.cabin || 'Y'} Class)</div></div>
        <div class="row"><div class="label">Frequent Flyer:</div><div>${lfm}</div></div>
        <div class="row"><div class="label">Special Services:</div><div>${specialStr}</div></div>
        <div class="row"><div class="label">Destination:</div><div>${p.arrival_station || 'N/A'}</div></div>
        ${staffDisplay}
    `;
}

checkTokenStatus();
</script>
</body>
</html>
