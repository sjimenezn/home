<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { font-family: monospace; margin: 0; padding: 10px; background: #121212; color: #f0f0f0; font-size: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; font-family: monospace; font-size: 11px; padding: 8px; border: 1px solid #444; border-radius: 4px; margin-bottom: 10px; resize: vertical; background: #1e1e1e; color: #f0f0f0; }
        .status { padding: 6px 10px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; display: none; }
        .status.show { display: block; }
        .ok { background: #2e4b2e; color: #d4edda; }
        .error { background: #5a3a3a; color: #f8d7da; }
        .stats { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat { flex: 1; text-align: center; padding: 12px 8px; background: #2a2a2a; border: 1px solid #444; border-radius: 4px; cursor: pointer; transition: all 0.2s; min-width: 80px; }
        .stat:hover { background: #3a3a3a; transform: scale(1.02); }
        .stat span { font-size: 24px; font-weight: bold; display: block; }
        .stat.active { background: #007bff; color: white; border-color: #007bff; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .sort-buttons { display: flex; gap: 5px; }
        .sort-btn { padding: 6px 12px; background: #3a3a3a; color: #f0f0f0; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px; }
        .sort-btn:hover { background: #4a4a4a; }
        .sort-btn.active { background: #007bff; border-color: #007bff; }
        .search-box { flex: 1; min-width: 150px; }
        .search-box input { width: 100%; padding: 6px; border: 1px solid #444; border-radius: 4px; background: #1e1e1e; color: #f0f0f0; font-family: monospace; font-size: 12px; }
        .search-box input::placeholder { color: #888; }
        .passenger-list { margin-top: 15px; max-height: 400px; overflow-y: auto; border: 1px solid #444; border-radius: 4px; }
        .passenger-item { padding: 8px; border-bottom: 1px solid #333; font-size: 11px; cursor: pointer; }
        .passenger-item:hover { background: #2a2a2a; }
        .passenger-item.selected { background: #007bff; color: white; }
        .details { background: #2a2a2a; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 15px; border: 1px solid #444; }
        .row { display: flex; margin-bottom: 6px; }
        .label { font-weight: bold; width: 100px; color: #b8b8d0; }
        .flight-info { background: #2a2a2a; padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 11px; border: 1px solid #444; }
        input, select { font-family: monospace; font-size: 12px; }
        .search-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-row input { flex: 1; padding: 8px; border: 1px solid #444; border-radius: 4px; background: #1e1e1e; color: #f0f0f0; }
        .search-row input:focus { outline: none; border-color: #007bff; }
        button { padding: 8px 16px; background: #3a3a3a; color: #f0f0f0; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-family: monospace; }
        button:hover { background: #4a4a4a; }
        .loading { text-align: center; padding: 20px; font-size: 12px; color: #888; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; margin-left: 8px; }
        .badge-c { background: #f093fb; color: #fff; }
        .badge-y { background: #4facfe; color: #fff; }
        .badge-staff { background: #ff9800; color: #fff; }
        .lfm { font-size: 10px; color: #aaa; }
        .auto-search-info { background: #2a4a6a; padding: 8px; border-radius: 4px; margin-bottom: 10px; font-size: 11px; color: #7ec8ff; text-align: center; }
        .clear-search { background: #5a3a3a; padding: 6px 12px; font-size: 11px; }
        .clear-search:hover { background: #7a4a4a; }
        .search-header { display: flex; gap: 8px; align-items: center; }
        .search-header input { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <textarea id="tokenInput" rows="2" placeholder=''></textarea>
    <div id="status" class="status"></div>

    <div class="search-row">
        <input type="text" id="flightNum" placeholder="Flight" value="124" size="8">
        <input type="text" id="dep" placeholder="From" value="UIO" size="5">
        <input type="date" id="date">
        <button onclick="search()">Search</button>
    </div>

    <div id="results"></div>
</div>

<script>
// Set default date to tomorrow
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
document.getElementById('date').value = tomorrow.toISOString().split('T')[0];

let currentPassengers = [];
let currentFilter = null;
let currentSort = 'seat';
let currentSearchTerm = '';

function isStaff(passenger) {
    return passenger.value_staff && passenger.value_staff.trim() !== '';
}

function getStaffValue(passenger) {
    return passenger.value_staff || '';
}

function getLfm(passenger) {
    if (passenger.lfm && passenger.lfm.length > 0) {
        var lfmData = passenger.lfm[0];
        return lfmData.tierDescription || lfmData.tierLevel || 'LifeMiles';
    }
    return '';
}

// Check for cached passenger data from flight_details page (INSTANT LOAD)
function checkForCachedData() {
    var cachedData = sessionStorage.getItem('paxlist_cached_data');
    if (cachedData) {
        try {
            var data = JSON.parse(cachedData);
            // Clear it immediately so it doesn't get used again
            sessionStorage.removeItem('paxlist_cached_data');
            
            if (data.passengers && data.passengers.length > 0) {
                // Use the cached data directly - NO API CALL NEEDED
                currentPassengers = data.passengers;
                
                // Populate the search fields
                if (data.flight_info) {
                    document.getElementById('flightNum').value = data.flight_info.flight_number;
                    document.getElementById('dep').value = data.flight_info.origin;
                    document.getElementById('date').value = data.flight_info.date;
                }
                
                // Display stats immediately without API call
                displayStats();
                return true;
            }
        } catch(e) {
            console.error('Error parsing cached data:', e);
        }
    }
    return false;
}

// Check for stored parameters from flight_details page (fallback)
function checkAndAutoSearch() {
    var storedFlightNum = sessionStorage.getItem('paxlist_flight_number');
    var storedOrigin = sessionStorage.getItem('paxlist_origin');
    var storedDate = sessionStorage.getItem('paxlist_date');
    
    if (storedFlightNum && storedOrigin && storedDate) {
        // Clear the stored parameters after reading
        sessionStorage.removeItem('paxlist_flight_number');
        sessionStorage.removeItem('paxlist_origin');
        sessionStorage.removeItem('paxlist_date');
        
        // Populate the search fields
        document.getElementById('flightNum').value = storedFlightNum;
        document.getElementById('dep').value = storedOrigin;
        document.getElementById('date').value = storedDate;
        
        // Show info message
        var resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<div class="auto-search-info">✈️ Loading flight AV' + storedFlightNum + ' from ' + storedOrigin + ' on ' + storedDate + '...</div>';
        
        // Execute search automatically
        setTimeout(function() {
            search();
        }, 100);
        return true;
    }
    return false;
}

// Auto-detect paste and save tokens
document.getElementById('tokenInput').addEventListener('paste', function(e) {
    setTimeout(async function() {
        var jsonInput = document.getElementById('tokenInput').value.trim();
        if (!jsonInput) return;
        
        var statusDiv = document.getElementById('status');
        statusDiv.className = 'status show';
        statusDiv.innerHTML = '🔄 Saving tokens...';
        statusDiv.style.background = '#2a4a2a';
        statusDiv.style.color = '#d4edda';
        
        try {
            var tokens = JSON.parse(jsonInput);
            if (typeof tokens === 'string') tokens = JSON.parse(tokens);
            
            var access_token = tokens.access_token;
            var refresh_token = tokens.refresh_token;
            if (Array.isArray(access_token)) access_token = access_token[0];
            if (Array.isArray(refresh_token)) refresh_token = refresh_token[0];
            
            var response = await fetch('/api/paxlist/set_initial_tokens', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({access_token: access_token, refresh_token: refresh_token})
            });
            var result = await response.json();
            
            if (result.success) {
                statusDiv.className = 'status show ok';
                statusDiv.innerHTML = '✅ Tokens saved';
                setTimeout(function() { statusDiv.classList.remove('show'); }, 2000);
                checkTokenStatus();
            } else {
                throw new Error(result.message);
            }
        } catch(e) {
            statusDiv.className = 'status show error';
            statusDiv.innerHTML = '❌ Invalid token format';
            setTimeout(function() { statusDiv.classList.remove('show'); }, 2000);
        }
    }, 50);
});

async function checkTokenStatus() {
    try {
        var response = await fetch('/api/paxlist/token_status');
        var data = await response.json();
        var statusDiv = document.getElementById('status');
        
        if (data.status.access_token_valid) {
            statusDiv.className = 'status show ok';
            statusDiv.innerHTML = '✅ Token: ' + data.status.access_expires_in_minutes + ' min left';
            setTimeout(function() { statusDiv.classList.remove('show'); }, 1500);
        }
    } catch(e) {}
}

async function search() {
    var resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<div class="loading">Loading...</div>';
    currentFilter = null;
    currentSearchTerm = '';
    currentSort = 'seat';
    
    try {
        var flightNum = document.getElementById('flightNum').value;
        var dep = document.getElementById('dep').value.toUpperCase();
        var date = document.getElementById('date').value;
        
        var response = await fetch('/api/paxlist/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                flight_carrier: 'AV',
                flight_number: flightNum,
                flight_departure_station: dep,
                flight_date: date
            })
        });
        
        var result = await response.json();
        
        if (result.success && result.data) {
            currentPassengers = result.data.passengers || [];
            displayStats();
        } else if (result.needs_new_tokens) {
            resultsDiv.innerHTML = '<div class="loading" style="color:#f44336;">❌ Token expired. Paste new token above.</div>';
        } else {
            resultsDiv.innerHTML = '<div class="loading" style="color:#f44336;">❌ ' + (result.message || 'Search failed') + '</div>';
        }
    } catch(e) {
        resultsDiv.innerHTML = '<div class="loading" style="color:#f44336;">❌ ' + e.message + '</div>';
    }
}

function filterAndSortPassengers() {
    var filtered = [];
    for (var i = 0; i < currentPassengers.length; i++) {
        filtered.push(currentPassengers[i]);
    }
    
    // Apply filter
    if (currentFilter === 'c') {
        var temp = [];
        for (var i = 0; i < filtered.length; i++) {
            if (filtered[i].cabin === 'C') temp.push(filtered[i]);
        }
        filtered = temp;
    } else if (currentFilter === 'y') {
        var temp = [];
        for (var i = 0; i < filtered.length; i++) {
            if (filtered[i].cabin !== 'C') temp.push(filtered[i]);
        }
        filtered = temp;
    } else if (currentFilter === 'staff') {
        var temp = [];
        for (var i = 0; i < filtered.length; i++) {
            if (isStaff(filtered[i])) temp.push(filtered[i]);
        }
        filtered = temp;
    }
    
    // Apply search
    if (currentSearchTerm) {
        var searchLower = currentSearchTerm.toLowerCase();
        var temp = [];
        for (var i = 0; i < filtered.length; i++) {
            var p = filtered[i];
            var name = (p.lastname || '') + ' ' + (p.firstname || '');
            name = name.toLowerCase();
            var seat = (p.seat || '').toLowerCase();
            if (name.indexOf(searchLower) !== -1 || seat.indexOf(searchLower) !== -1) {
                temp.push(p);
            }
        }
        filtered = temp;
    }
    
    // Apply sort
    if (currentSort === 'seat') {
        filtered.sort(function(a, b) {
            var seatA = a.seat || 'ZZZ';
            var seatB = b.seat || 'ZZZ';
            if (seatA < seatB) return -1;
            if (seatA > seatB) return 1;
            return 0;
        });
    } else if (currentSort === 'name') {
        filtered.sort(function(a, b) {
            var nameA = (a.lastname || '') + ', ' + (a.firstname || '');
            var nameB = (b.lastname || '') + ', ' + (b.firstname || '');
            if (nameA < nameB) return -1;
            if (nameA > nameB) return 1;
            return 0;
        });
    }
    
    return filtered;
}

function renderPassengerList() {
    var filtered = filterAndSortPassengers();
    var listDiv = document.getElementById('passengerList');
    var detailsDiv = document.getElementById('details');
    if (detailsDiv) detailsDiv.style.display = 'none';
    
    if (filtered.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">No passengers found</div>';
        return;
    }
    
    var html = '';
    for (var i = 0; i < filtered.length; i++) {
        var p = filtered[i];
        var name = ((p.lastname || '') + ', ' + (p.firstname || '')).trim() || 'Unknown';
        var seat = p.seat || '???';
        var cabin = p.cabin || 'Y';
        var lfm = getLfm(p);
        var staffValue = getStaffValue(p);
        
        var cabinBadge = cabin === 'C' ? '<span class="badge badge-c">C</span>' : '<span class="badge badge-y">Y</span>';
        var staffBadge = staffValue ? '<span class="badge badge-staff">' + staffValue + '</span>' : '';
        var lfmText = lfm ? '<span class="lfm">⭐' + lfm + '</span>' : '';
        
        // Find original index
        var originalIndex = -1;
        for (var j = 0; j < currentPassengers.length; j++) {
            if (currentPassengers[j] === p) {
                originalIndex = j;
                break;
            }
        }
        
        html += '<div class="passenger-item" onclick="showPassengerDetails(' + originalIndex + ')">';
        html += '<strong>' + seat + '</strong> - ' + name + ' ' + cabinBadge + ' ' + staffBadge + ' ' + lfmText;
        html += '</div>';
    }
    
    listDiv.innerHTML = html;
}

function displayStats() {
    var total = currentPassengers.length;
    var cClass = 0, yClass = 0, staff = 0;
    
    for (var i = 0; i < currentPassengers.length; i++) {
        var p = currentPassengers[i];
        if (p.cabin === 'C') cClass++;
        else yClass++;
        if (isStaff(p)) staff++;
    }
    
    var flightNum = document.getElementById('flightNum').value;
    var dep = document.getElementById('dep').value.toUpperCase();
    var date = document.getElementById('date').value;
    var destination = currentPassengers[0] && currentPassengers[0].arrival_station ? currentPassengers[0].arrival_station : '???';
    
    var html = '<div class="flight-info">';
    html += '✈️ AV' + flightNum + ' | ';
    html += dep + ' → ' + destination + ' | ';
    html += '📅 ' + date;
    html += '</div>';
    
    html += '<div class="stats">';
    html += '<div class="stat" onclick="setFilter(\'all\')" id="statAll"><span>' + total + '</span>Total</div>';
    html += '<div class="stat" onclick="setFilter(\'c\')" id="statC"><span>' + cClass + '</span>Business (C)</div>';
    html += '<div class="stat" onclick="setFilter(\'y\')" id="statY"><span>' + yClass + '</span>Economy (Y)</div>';
    html += '<div class="stat" onclick="setFilter(\'staff\')" id="statStaff"><span>' + staff + '</span>Staff</div>';
    html += '</div>';
    
    html += '<div class="controls">';
    html += '<div class="sort-buttons">';
    html += '<button class="sort-btn ' + (currentSort === 'seat' ? 'active' : '') + '" onclick="setSort(\'seat\')">Sort by Seat</button>';
    html += '<button class="sort-btn ' + (currentSort === 'name' ? 'active' : '') + '" onclick="setSort(\'name\')">Sort by Name</button>';
    html += '</div>';
    html += '<div class="search-box">';
    html += '<div class="search-header">';
    html += '<input type="text" id="searchInput" placeholder="🔍 Search by name or seat..." onkeyup="handleSearch()">';
    html += '<button class="clear-search" onclick="clearSearch()">Clear</button>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
    
    html += '<div id="passengerList" class="passenger-list"></div>';
    html += '<div id="details" class="details" style="display:none;"></div>';
    
    document.getElementById('results').innerHTML = html;
    
    // Set active stat highlight
    var allStats = document.querySelectorAll('.stat');
    for (var i = 0; i < allStats.length; i++) {
        allStats[i].classList.remove('active');
    }
    if (currentFilter === 'all' || !currentFilter) {
        var statAll = document.getElementById('statAll');
        if (statAll) statAll.classList.add('active');
    } else if (currentFilter === 'c') {
        var statC = document.getElementById('statC');
        if (statC) statC.classList.add('active');
    } else if (currentFilter === 'y') {
        var statY = document.getElementById('statY');
        if (statY) statY.classList.add('active');
    } else if (currentFilter === 'staff') {
        var statStaff = document.getElementById('statStaff');
        if (statStaff) statStaff.classList.add('active');
    }
    
    renderPassengerList();
    checkTokenStatus();
}

function setFilter(filter) {
    currentFilter = filter;
    var allStats = document.querySelectorAll('.stat');
    for (var i = 0; i < allStats.length; i++) {
        allStats[i].classList.remove('active');
    }
    if (filter === 'all') {
        var statAll = document.getElementById('statAll');
        if (statAll) statAll.classList.add('active');
    } else if (filter === 'c') {
        var statC = document.getElementById('statC');
        if (statC) statC.classList.add('active');
    } else if (filter === 'y') {
        var statY = document.getElementById('statY');
        if (statY) statY.classList.add('active');
    } else if (filter === 'staff') {
        var statStaff = document.getElementById('statStaff');
        if (statStaff) statStaff.classList.add('active');
    }
    renderPassengerList();
}

function setSort(sort) {
    currentSort = sort;
    var sortBtns = document.querySelectorAll('.sort-btn');
    for (var i = 0; i < sortBtns.length; i++) {
        sortBtns[i].classList.remove('active');
    }
    if (sort === 'seat') {
        var firstBtn = document.querySelector('.sort-btn:first-child');
        if (firstBtn) firstBtn.classList.add('active');
    } else if (sort === 'name') {
        var lastBtn = document.querySelector('.sort-btn:last-child');
        if (lastBtn) lastBtn.classList.add('active');
    }
    renderPassengerList();
}

function handleSearch() {
    var searchInput = document.getElementById('searchInput');
    if (searchInput) {
        currentSearchTerm = searchInput.value;
    }
    renderPassengerList();
}

function clearSearch() {
    var searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.value = '';
    }
    currentSearchTerm = '';
    renderPassengerList();
}

function showPassengerDetails(index) {
    var p = currentPassengers[index];
    var detailsDiv = document.getElementById('details');
    
    var passengerItems = document.querySelectorAll('.passenger-item');
    for (var i = 0; i < passengerItems.length; i++) {
        passengerItems[i].classList.remove('selected');
        if (i === index) passengerItems[i].classList.add('selected');
    }
    
    var lfm = '-';
    if (p.lfm && p.lfm.length > 0) {
        var lfmData = p.lfm[0];
        lfm = (lfmData.carrier || '') + ' ' + (lfmData.number || '') + ' (' + (lfmData.tierDescription || lfmData.tierLevel || 'LifeMiles') + ')';
    }
    
    var special = [];
    if (p.meal_code) special.push('🍽️ Meal: ' + p.meal_code);
    if (p.value_chd === 'CHD') special.push('👶 Child');
    if (p.value_inf === 'INF') special.push('🍼 Infant');
    if (p.ssr_code) special.push('♿ ' + p.ssr_code);
    var specialStr = special.length ? special.join(' | ') : '-';
    
    var staffValue = getStaffValue(p);
    var staffDisplay = staffValue ? '<div class="row"><div class="label">Staff:</div><div>✅ ' + staffValue + '</div></div>' : '';
    
    detailsDiv.style.display = 'block';
    detailsDiv.innerHTML = '<div class="row"><div class="label">Name:</div><div><strong>' + (p.lastname || '') + ', ' + (p.firstname || '') + '</strong></div></div>';
    detailsDiv.innerHTML += '<div class="row"><div class="label">Seat:</div><div>' + (p.seat || 'N/A') + ' (' + (p.cabin || 'Y') + ' Class)</div></div>';
    detailsDiv.innerHTML += '<div class="row"><div class="label">Frequent Flyer:</div><div>' + lfm + '</div></div>';
    detailsDiv.innerHTML += '<div class="row"><div class="label">Special Services:</div><div>' + specialStr + '</div></div>';
    detailsDiv.innerHTML += '<div class="row"><div class="label">Destination:</div><div>' + (p.arrival_station || 'N/A') + '</div></div>';
    detailsDiv.innerHTML += staffDisplay;
}

// Check for cached data first (INSTANT LOAD), then auto-search, then token status
requestAnimationFrame(function() {
    var hasCachedData = checkForCachedData();
    if (!hasCachedData) {
        var hasParams = checkAndAutoSearch();
        if (!hasParams) {
            checkTokenStatus();
        }
    }
});
</script>
</body>
</html>
