<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { font-family: monospace; margin: 0; padding: 10px; background: #fff; }
        textarea { width: 100%; font-family: monospace; font-size: 11px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; resize: vertical; }
        .status { padding: 6px 10px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; display: none; }
        .status.show { display: block; }
        .ok { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .flight-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; margin-bottom: 8px; background: #f8f9fa; border-radius: 4px; cursor: pointer; }
        .flight-row:hover { background: #e9ecef; }
        .flight-info { font-size: 13px; }
        .flight-stats { font-family: monospace; font-size: 12px; font-weight: bold; background: #e8f4f8; padding: 4px 8px; border-radius: 4px; }
        .flight-stats.loading { background: #fff3cd; color: #856404; }
        .flight-stats.error { background: #f8d7da; color: #721c24; }
        .passenger-list { margin-top: 15px; max-height: 400px; overflow-y: auto; display: none; }
        .passenger-list.show { display: block; }
        .passenger-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 11px; cursor: pointer; }
        .passenger-item:hover { background: #f0f0f0; }
        .passenger-item.selected { background: #007bff; color: white; }
        .details { background: #f5f5f5; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 15px; display: none; }
        .details.show { display: block; }
        .row { display: flex; margin-bottom: 6px; }
        .label { font-weight: bold; width: 100px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; margin-left: 8px; }
        .badge-c { background: #f093fb; color: #fff; }
        .badge-y { background: #4facfe; color: #fff; }
        .badge-staff { background: #ff9800; color: #fff; }
        .lfm { font-size: 10px; color: #666; }
        .flight-dest { color: #666; font-size: 11px; }
        input, select { font-family: monospace; font-size: 12px; }
        .search-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-row input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 6px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; }
        button:hover { background: #0056b3; }
        .loading-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #f3f3f3; border-top: 2px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
<textarea id="tokenInput" rows="2" placeholder='{"access_token":"...","refresh_token":"..."}'></textarea>
<div id="status" class="status"></div>

<div class="title">Flight Schedule</div>
<div id="flightsList"></div>

<div id="passengerList" class="passenger-list"></div>
<div id="details" class="details"></div>

<script>
// Flight schedule data
const flights = [
    { num: "124", from: "UIO", date: "2026-04-10" },
    { num: "120", from: "BOG", date: "2026-04-11" },
    { num: "128", from: "MDE", date: "2026-04-12" }
];

let flightData = {};

function isStaff(passenger) {
    return passenger.value_staff && passenger.value_staff.trim() !== '';
}

function getStaffValue(passenger) {
    return passenger.value_staff || '';
}

function getLfm(passenger) {
    if (passenger.lfm && passenger.lfm.length > 0) {
        const lfmData = passenger.lfm[0];
        return lfmData.tierDescription || lfmData.tierLevel || 'LifeMiles';
    }
    return '';
}

// Auto-detect paste and save tokens
document.getElementById('tokenInput').addEventListener('paste', function(e) {
    setTimeout(async () => {
        const jsonInput = document.getElementById('tokenInput').value.trim();
        if (!jsonInput) return;
        
        const statusDiv = document.getElementById('status');
        statusDiv.className = 'status show';
        statusDiv.innerHTML = '🔄 Saving tokens...';
        statusDiv.style.background = '#fff3cd';
        statusDiv.style.color = '#856404';
        
        try {
            let tokens = JSON.parse(jsonInput);
            if (typeof tokens === 'string') tokens = JSON.parse(tokens);
            
            let access_token = tokens.access_token;
            let refresh_token = tokens.refresh_token;
            if (Array.isArray(access_token)) access_token = access_token[0];
            if (Array.isArray(refresh_token)) refresh_token = refresh_token[0];
            
            const response = await fetch('/api/paxlist/set_initial_tokens', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({access_token, refresh_token})
            });
            const result = await response.json();
            
            if (result.success) {
                statusDiv.className = 'status show ok';
                statusDiv.innerHTML = '✅ Tokens saved. Reloading flights...';
                setTimeout(() => {
                    statusDiv.classList.remove('show');
                    loadAllFlights();
                }, 1000);
            } else {
                throw new Error(result.message);
            }
        } catch(e) {
            statusDiv.className = 'status show error';
            statusDiv.innerHTML = '❌ Invalid token format';
            setTimeout(() => { statusDiv.classList.remove('show'); }, 2000);
        }
    }, 50);
});

async function checkTokenStatus() {
    try {
        const response = await fetch('/api/paxlist/token_status');
        const data = await response.json();
        return data.status.access_token_valid;
    } catch(e) {
        return false;
    }
}

async function fetchFlightPax(flight) {
    try {
        const response = await fetch('/api/paxlist/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                flight_carrier: 'AV',
                flight_number: flight.num,
                flight_departure_station: flight.from,
                flight_date: flight.date
            })
        });
        
        const result = await response.json();
        
        if (result.success && result.data) {
            const passengers = result.data.passengers || [];
            let total = passengers.length;
            let cClass = 0, yClass = 0, staff = 0;
            
            for (const p of passengers) {
                if (p.cabin === 'C') cClass++;
                else yClass++;
                if (isStaff(p)) staff++;
            }
            
            return {
                success: true,
                total, cClass, yClass, staff,
                passengers,
                destination: passengers[0]?.arrival_station || '???'
            };
        } else if (result.needs_new_tokens) {
            return { success: false, error: 'Token expired' };
        } else {
            return { success: false, error: result.message || 'No data' };
        }
    } catch(e) {
        return { success: false, error: e.message };
    }
}

async function loadAllFlights() {
    const hasToken = await checkTokenStatus();
    if (!hasToken) {
        document.getElementById('flightsList').innerHTML = '<div style="padding:20px;text-align:center;color:#999;">⚠️ No valid token. Paste token above.</div>';
        return;
    }
    
    document.getElementById('flightsList').innerHTML = '<div style="padding:20px;text-align:center;">Loading flights...</div>';
    
    for (const flight of flights) {
        flightData[`${flight.num}_${flight.from}`] = { loading: true };
        renderFlightsList();
        
        // Fetch in background
        fetchFlightPax(flight).then(data => {
            flightData[`${flight.num}_${flight.from}`] = {
                loading: false,
                ...data,
                flight
            };
            renderFlightsList();
        });
    }
}

function renderFlightsList() {
    let html = '';
    
    for (const flight of flights) {
        const key = `${flight.num}_${flight.from}`;
        const data = flightData[key];
        
        if (!data || data.loading) {
            html += `
                <div class="flight-row">
                    <div class="flight-info">
                        <strong>AV${flight.num}</strong> ${flight.from} → ... 
                        <span class="flight-dest">${flight.date}</span>
                    </div>
                    <div class="flight-stats loading">
                        Loading... <span class="loading-spinner"></span>
                    </div>
                </div>
            `;
        } else if (!data.success) {
            html += `
                <div class="flight-row">
                    <div class="flight-info">
                        <strong>AV${flight.num}</strong> ${flight.from} → ??? 
                        <span class="flight-dest">${flight.date}</span>
                    </div>
                    <div class="flight-stats error">
                        ❌ ${data.error}
                    </div>
                </div>
            `;
        } else {
            html += `
                <div class="flight-row" onclick="showPassengers('${flight.num}', '${flight.from}')">
                    <div class="flight-info">
                        <strong>AV${flight.num}</strong> ${flight.from} → ${data.destination}
                        <span class="flight-dest">${flight.date}</span>
                    </div>
                    <div class="flight-stats">
                        T:${data.total} C:${data.cClass} Y:${data.yClass} S:${data.staff}
                    </div>
                </div>
            `;
        }
    }
    
    document.getElementById('flightsList').innerHTML = html;
}

let currentPassengers = [];
let currentFlightKey = '';

function showPassengers(flightNum, flightFrom) {
    const key = `${flightNum}_${flightFrom}`;
    const data = flightData[key];
    
    if (!data || !data.success || !data.passengers) return;
    
    currentPassengers = data.passengers;
    currentFlightKey = key;
    
    const passengerListDiv = document.getElementById('passengerList');
    const detailsDiv = document.getElementById('details');
    detailsDiv.classList.remove('show');
    
    let html = `<div style="margin-bottom:10px;"><strong>AV${flightNum} ${flightFrom} → ${data.destination}</strong> (${data.date})</div>`;
    
    // Sort by seat
    const sorted = [...currentPassengers].sort((a, b) => {
        const seatA = a.seat || 'ZZZ';
        const seatB = b.seat || 'ZZZ';
        return seatA.localeCompare(seatB);
    });
    
    for (let i = 0; i < sorted.length; i++) {
        const p = sorted[i];
        const name = `${p.lastname || ''}, ${p.firstname || ''}`.trim() || 'Unknown';
        const seat = p.seat || '???';
        const cabin = p.cabin || 'Y';
        const lfm = getLfm(p);
        const staffValue = getStaffValue(p);
        
        const cabinBadge = cabin === 'C' ? '<span class="badge badge-c">C</span>' : '<span class="badge badge-y">Y</span>';
        const staffBadge = staffValue ? `<span class="badge badge-staff">${staffValue}</span>` : '';
        const lfmText = lfm ? `<span class="lfm">⭐${lfm}</span>` : '';
        
        html += `
            <div class="passenger-item" onclick="showPassengerDetails(${currentPassengers.indexOf(p)})">
                <strong>${seat}</strong> - ${name} ${cabinBadge} ${staffBadge} ${lfmText}
            </div>
        `;
    }
    
    passengerListDiv.innerHTML = html;
    passengerListDiv.classList.add('show');
}

function showPassengerDetails(index) {
    const p = currentPassengers[index];
    const detailsDiv = document.getElementById('details');
    
    document.querySelectorAll('.passenger-item').forEach((item, i) => {
        item.classList.remove('selected');
        if (i === index) item.classList.add('selected');
    });
    
    let lfm = '-';
    if (p.lfm && p.lfm.length > 0) {
        const lfmData = p.lfm[0];
        lfm = `${lfmData.carrier || ''} ${lfmData.number || ''} (${lfmData.tierDescription || lfmData.tierLevel || 'LifeMiles'})`;
    }
    
    let special = [];
    if (p.meal_code) special.push(`🍽️ Meal: ${p.meal_code}`);
    if (p.value_chd === 'CHD') special.push('👶 Child');
    if (p.value_inf === 'INF') special.push('🍼 Infant');
    if (p.ssr_code) special.push(`♿ ${p.ssr_code}`);
    const specialStr = special.length ? special.join(' | ') : '-';
    
    const staffValue = getStaffValue(p);
    const staffDisplay = staffValue ? `<div class="row"><div class="label">Staff:</div><div>✅ ${staffValue}</div></div>` : '';
    
    detailsDiv.classList.add('show');
    detailsDiv.innerHTML = `
        <div class="row"><div class="label">Name:</div><div><strong>${p.lastname || ''}, ${p.firstname || ''}</strong></div></div>
        <div class="row"><div class="label">Seat:</div><div>${p.seat || 'N/A'} (${p.cabin || 'Y'} Class)</div></div>
        <div class="row"><div class="label">Frequent Flyer:</div><div>${lfm}</div></div>
        <div class="row"><div class="label">Special Services:</div><div>${specialStr}</div></div>
        <div class="row"><div class="label">Destination:</div><div>${p.arrival_station || 'N/A'}</div></div>
        ${staffDisplay}
    `;
}

// Load flights on page load
loadAllFlights();
</script>
</body>
</html>
